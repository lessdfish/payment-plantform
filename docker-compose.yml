# 分布式支付收银台 & 账务系统 — Docker Compose 中间件编排
# 一键启动命令：docker-compose up -d
# 查看状态：docker-compose ps

services:
  # ==================== 注册 & 配置中心 ====================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: payment-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== 数据库（4 个分片） ====================
  mysql-ds0:
    image: mysql:8.0.33
    container_name: payment-mysql-ds0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - ./sql/init-ds0.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-ds1:
    image: mysql:8.0.33
    container_name: payment-mysql-ds1
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - ./sql/init-ds1.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --default-authentication-plugin=mysql_native_password

  mysql-ds2:
    image: mysql:8.0.33
    container_name: payment-mysql-ds2
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - ./sql/init-ds2.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --default-authentication-plugin=mysql_native_password

  mysql-ds3:
    image: mysql:8.0.33
    container_name: payment-mysql-ds3
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - ./sql/init-ds3.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: --default-authentication-plugin=mysql_native_password

  # ==================== 缓存 ====================
  redis:
    image: redis:7.2
    container_name: payment-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== 消息队列 ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: payment-rocketmq-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: payment-rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876

  kafka:
    image: bitnamilegacy/kafka:3.7.0-debian-12-r8
    container_name: payment-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

  # ==================== 定时任务 & 数据同步 ====================
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: payment-xxl-job
    ports:
      - "8087:8080"
    environment:
      PARAMS: "--spring.datasource.url=jdbc:mysql://mysql-ds0:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai --spring.datasource.username=root --spring.datasource.password=root123"
    depends_on:
      - mysql-ds0

  # Canal Server（监听 MySQL Binlog）
  # 注意：需要先在 MySQL 中开启 Binlog（在 my.cnf 中设置 log-bin=mysql-bin, binlog-format=ROW, server-id=1）
  # canal-server:
  #   image: canal/canal-server:v1.1.7
  #   container_name: payment-canal
  #   ports:
  #     - "11111:11111"
  #   depends_on:
  #     - mysql-ds0

  # ==================== 限流熔断 ====================
  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.7
    container_name: payment-sentinel
    ports:
      - "8858:8080"
