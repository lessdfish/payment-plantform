# 支付网关 — 本地开发配置
server:
  port: 8080

spring:
  application:
    name: payment-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    sentinel:
      transport:
        dashboard: localhost:8858
  data:
    redis:
      host: localhost
      port: 16379

rocketmq:
  name-server: localhost:9876
  producer:
    group: payment-gateway-producer

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
