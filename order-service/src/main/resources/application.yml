# 订单服务 — 本地开发配置
server:
  port: 8082

spring:
  application:
    name: order-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

rocketmq:
  name-server: localhost:9876

snowflake:
  worker-id: 3
  data-center-id: 1
